<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="icon" type="image/png" href="./images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<!-- ============================================ -->
<!-- HEADER SECTION -->
<!-- Contains logo and navigation menu with links-->
<!-- ============================================ -->
    <header>
        <img src="./images/logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" class="login-button">Login</a>
        </nav>
    </header>

<!-- ============================================ -->
<!-- MAIN CONTENT SECTION -->
<!-- Displays places with filtering for place-->
<!-- ============================================ -->
    <main>
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="all">All</option>
                <option value="100">$100</option>
                <option value="150">$150</option>
                <option value="200">$200</option>
                <option value="250">$250</option>
            </select>
        </section>
        <section id="places-list">
            <!-- List of places will be populated dynamically -->
        </section>
    </main>

     <!-- JavaScript files -->
    <script src="scripts.js"></script>

<!-- ============================================ -->
<!-- FOOTER SECTION -->
<!-- ============================================ -->
    <footer>
        <p>© 2026 HBnB. All rights reserved.</p>
    </footer>
</body>
</html>
