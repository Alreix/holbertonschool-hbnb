<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="icon" type="image/png" href="./images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<!-- ============================================ -->
<!-- HEADER SECTION -->
<!-- ============================================ -->
    <header>
        <img src="./images/logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" class="login-button">Login</a>
        </nav>
    </header>

<!-- ============================================ -->
<!-- MAIN CONTENT SECTION -->
<!-- ============================================ -->
    <main>
        <h1>Available Places</h1>

<!-- Filter section -->
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="all">All</option>
                <option value="100">$100</option>
                <option value="150">$150</option>
                <option value="200">$200</option>
                <option value="250">$250</option>
            </select>
        </section>

<!-- Place list -->
        <section id="places-list">
            <article class="place-card">
                <h2>Beautiful Beach House</h2>
                <p>Price per night: 150$</p>
                <a href="place.html" class="details-button">View Details</a>
            </article>

            <article class="place-card">
                <h2>Cozy Cabin</h2>
                <p>Price per night: 100$</p>
                <a href="place.html" class="details-button">View Details</a>
            </article>

            <article class="place-card">
                <h2>Traditional Mansion</h2>
                <p>Price per night: 200$</p>
                <a href="place.html" class="details-button">View Details</a>
            </article>
        </section>
    </main>

<!-- JavaScript files -->
    <script src="scripts.js"></script>

<!-- ============================================ -->
<!-- FOOTER SECTION -->
<!-- ============================================ -->
    <footer>
        <p>© 2026 HBnB. All rights reserved.</p>
    </footer>
</body>
</html>
