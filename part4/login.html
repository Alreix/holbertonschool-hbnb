<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="./images/icon.png">
</head>
<body>
<!-- ============================================ -->
<!-- HEADER SECTION -->
<!-- ============================================ -->
    <header>
        <img src="./images/logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <button id="logout-btn" class="logout-button" style="display: none;">Logout</button>
        </nav>
    </header>

<!-- ============================================ -->
<!-- MAIN CONTENT SECTION -->
<!-- ============================================ -->
    <main>
        <form id="login-form">
            <h2>Login</h2>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Login</button>
        </form>
    </main>
    <script src="scripts.js"></script>

<!-- ============================================ -->
<!-- FOOTER SECTION -->
<!-- ============================================ -->
    <footer>
        <p>© 2026 HBnB. All rights reserved.</p>
    </footer>
</body>
</html>
